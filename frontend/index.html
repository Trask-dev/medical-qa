<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵兰健康</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══ 登录/注册页 ═══ -->
<div id="authPage" class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">兰</div>
      <h1>灵兰健康</h1>
    </div>

    <div class="tab-row">
      <button class="tab active" id="tabLogin">登录</button>
      <button class="tab" id="tabRegister">注册</button>
    </div>

    <div class="error-msg" id="authError"></div>

    <div id="formLogin">
      <div class="field"><label>手机号</label><input type="tel" id="loginPhone" placeholder="请输入手机号" maxlength="20"></div>
      <div class="field"><label>密码</label><input type="password" id="loginPw" placeholder="请输入密码" maxlength="128"></div>
      <button class="btn-submit" id="btnLogin">登录</button>
    </div>

    <div id="formRegister" class="hidden">
      <div class="field"><label>手机号</label><input type="tel" id="regPhone" placeholder="请输入手机号" maxlength="20"></div>
      <div class="field"><label>密码（至少6位）</label><input type="password" id="regPw" placeholder="请输入密码" maxlength="128"></div>
      <div class="field"><label>昵称</label><input type="text" id="regNick" placeholder="如何称呼您" maxlength="50"></div>
      <button class="btn-submit" id="btnRegister">注册</button>
    </div>
  </div>
</div>

<!-- ═══ 主应用 ═══ -->
<div id="appPage" class="app hidden">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">兰</div>
      <h1>灵兰健康</h1>
    </div>
    <button class="btn-new" id="btnNewSession">+ 新建会话</button>
    <div class="sidebar-sessions">
      <div class="section-label">近期会话</div>
      <div id="sessionList"></div>
    </div>
    <div class="sidebar-bottom">
      <div class="sidebar-user" title="点击查看/编辑个人信息">
        <div class="avatar" id="sidebarAvatar" style="cursor:pointer">用</div>
        <div>
          <div class="name" id="sidebarName">加载中...</div>
          <div class="phone" id="sidebarPhone"></div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="chat-header">
      <span class="stage-badge" id="stageBadge" style="display:none">问诊中</span>
      <span class="stage-badge expert" id="expertBadge" style="display:none">专家问诊</span>
      <span class="round-info" id="roundInfo"></span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="welcome">
        <h2>灵兰健康</h2>
        <p>描述您的症状，AI 将为您逐步分析</p>
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="描述您的症状...">
      <button id="sendBtn">发送</button>
    </div>
  </main>
</div>

<!-- ═══ 个人信息弹窗 ═══ -->
<div id="profileModal" class="modal-overlay hidden">
  <div class="modal">
    <h2>个人信息</h2>
    <div class="field"><label>昵称</label><input type="text" id="pfNick" maxlength="50"></div>
    <div class="field-row">
      <div class="field"><label>性别</label><select id="pfGender"><option value="">未设置</option><option value="男">男</option><option value="女">女</option></select></div>
      <div class="field"><label>血型</label><select id="pfBlood"><option value="">未设置</option><option>A</option><option>B</option><option>AB</option><option>O</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>身高 (cm)</label><input type="number" id="pfHeight" placeholder="170" min="50" max="250"></div>
      <div class="field"><label>体重 (kg)</label><input type="number" id="pfWeight" placeholder="65" min="20" max="300"></div>
    </div>
    <div class="field"><label>过敏史（逗号分隔）</label><input type="text" id="pfAllergies" placeholder="青霉素, 花粉"></div>
    <div class="field"><label>慢性病史</label><input type="text" id="pfChronic" placeholder="高血压, 糖尿病"></div>
    <div class="btn-row">
      <button class="btn-cancel" id="btnProfileCancel">取消</button>
      <button class="btn-save" id="btnProfileSave">保存</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
