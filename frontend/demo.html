<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵兰 · AI 健康咨询</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   灵兰 · 紫调系统
   Eggplant(半透明): rgba(45,36,56,0.92)  Lavender: #f5f1fa
   Wisteria: #8b6b9e  Plum: #5a3e6b  Mauve: #c49dbd  Lilac: #b8a9c6
   ═══════════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --eggplant: #2d2438;
  --eggplant-glass: rgba(45, 36, 56, 0.90);
  --lavender: #f5f1fa;
  --white: #ffffff;
  --wisteria: #8b6b9e;
  --wisteria-ghost: #f3eef8;
  --plum: #5a3e6b;
  --mauve: #c49dbd;
  --lilac: #b8a9c6;
  --lilac-light: #d4cce0;
  --sage: #7d9e8b;
  --text: #2d2438;
  --text-secondary: #6b5e78;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --shadow-card: 0 1px 3px rgba(45,36,56,0.06), 0 1px 2px rgba(45,36,56,0.04);
  --shadow-elevated: 0 4px 16px rgba(45,36,56,0.08), 0 2px 4px rgba(45,36,56,0.04);
  --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
}

html { font-size: 18px; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: var(--lavender);
  color: var(--text);
  height: 100vh; height: 100dvh;
  display: flex;
  -webkit-font-smoothing: antialiased;
}

/* ── App Shell ──────────────────────── */
.app {
  width: 100%; height: 100vh; height: 100dvh;
  display: flex; overflow: hidden;
  background: var(--white);
}

/* ── Sidebar ────────────────────────── */
.sidebar {
  flex: 0 0 clamp(16rem, 20vw, 22rem);
  background: var(--eggplant-glass);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: rgba(255,255,255,0.9);
  display: flex; flex-direction: column;
  min-width: 0;
}

.sidebar-brand {
  padding: clamp(1.2rem, 2.5vh, 1.6rem);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 0.6rem;
}
.sidebar-brand .logo {
  width: clamp(2rem, 3.5vw, 2.4rem); height: clamp(2rem, 3.5vw, 2.4rem);
  background: var(--wisteria);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-family: "STSong", "Songti SC", "Noto Serif SC", serif;
  font-size: clamp(1.25rem, 2.2vw, 1.45rem);
  color: var(--white); flex-shrink: 0;
}
.sidebar-brand h1 {
  font-family: "STSong", "Songti SC", "Noto Serif SC", serif;
  font-size: clamp(1.15rem, 1.6vw, 1.40rem);
  font-weight: 400; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.95);
}

/* ── Sidebar Bottom: User ── */
.sidebar-bottom {
  padding: clamp(0.8rem, 1.5vh, 1.2rem);
  border-top: 1px solid rgba(255,255,255,0.06);
}
.sidebar-user {
  display: flex; align-items: center; gap: 0.6rem;
}
.sidebar-user .avatar {
  width: clamp(2.2rem, 4vw, 2.8rem); height: clamp(2.2rem, 4vw, 2.8rem);
  border-radius: 50%; background: #4a3d5a;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(1.15rem, 1.8vw, 1.35rem); flex-shrink: 0;
}
.sidebar-user .name {
  font-size: clamp(1.05rem, 1.4vw, 1.20rem); font-weight: 500;
}
.sidebar-user .phone {
  font-size: clamp(0.90rem, 1.1vw, 1.00rem); color: var(--lilac); margin-top: 2px;
}
.btn-new {
  display: block; width: calc(100% - 2rem);
  margin: 0.5rem 1rem; padding: clamp(0.45rem, 1vh, 0.6rem);
  background: var(--wisteria); border: none;
  border-radius: var(--radius-sm); color: #fff;
  font-size: clamp(0.95rem, 1.2vw, 1.05rem); font-weight: 500;
  cursor: pointer; transition: var(--transition);
  font-family: inherit; text-align: center;
}
.btn-new:hover { background: var(--plum); }

/* ── Sidebar Sessions ────────────────── */
.sidebar-sessions {
  flex: 1; overflow-y: auto; padding: 0.4rem 0;
}
.sidebar-sessions .section-label {
  padding: 0.7rem 1.2rem 0.3rem;
  font-size: clamp(0.80rem, 1vw, 0.90rem);
  letter-spacing: 0.08em; color: var(--lilac);
}
.sidebar-session {
  padding: 0.55rem 1.2rem; cursor: pointer;
  transition: background var(--transition);
  border-left: 2px solid transparent;
  display: flex; align-items: center; gap: 0.5rem;
}
.sidebar-session:hover { background: rgba(255,255,255,0.04); }
.sidebar-session.active {
  background: rgba(255,255,255,0.06);
  border-left-color: var(--wisteria);
}
.sidebar-session .indicator {
  width: 0.4rem; height: 0.4rem; border-radius: 50%;
  background: #6b9ccc; flex-shrink: 0;
}
.sidebar-session .info { flex: 1; min-width: 0; }
.sidebar-session .title {
  font-size: clamp(0.95rem, 1.2vw, 1.05rem);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-session .meta {
  font-size: clamp(0.85rem, 1vw, 0.95rem);
  color: var(--lilac); margin-top: 2px;
}

/* ── Main Chat (centered) ────────────── */
.main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; min-width: 0;
  background: var(--lavender);
}
.chat-header {
  width: 100%; max-width: 48rem;
  padding: 0.8rem 1.4rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.chat-header .stage-badge {
  font-size: clamp(0.85rem, 1.1vw, 0.95rem); font-weight: 500;
  padding: 0.2rem 0.7rem; border-radius: 99px;
  background: var(--wisteria-ghost); color: var(--wisteria);
}
.chat-header .stage-badge.expert { background: #e8f0f9; color: #4a6fa5; }
.chat-header .round-info {
  margin-left: auto;
  font-size: clamp(0.90rem, 1.1vw, 1.00rem);
  color: var(--text-secondary);
}

.chat-messages {
  flex: 1; width: 100%; max-width: 48rem;
  overflow-y: auto; padding: 1rem 0;
  display: flex; flex-direction: column; gap: 0.9rem;
}

/* ── Input Area ─────────────────────── */
.chat-input {
  width: 100%; max-width: 48rem;
  padding: 0.6rem 0 1.2rem;
  display: flex; gap: 0.6rem;
}
.chat-input input {
  flex: 1; padding: 0.7rem 0.9rem;
  border: 1.5px solid var(--lilac-light);
  border-radius: var(--radius-md);
  font-size: clamp(1.00rem, 1.3vw, 1.15rem);
  outline: none; transition: border-color var(--transition);
  font-family: inherit; background: var(--white);
}
.chat-input input:focus { border-color: var(--wisteria); }
.chat-input button {
  padding: 0.7rem 1.6rem;
  background: var(--wisteria); color: var(--white);
  border: none; border-radius: var(--radius-md);
  font-size: clamp(1.00rem, 1.3vw, 1.15rem); font-weight: 500;
  cursor: pointer; transition: var(--transition);
  font-family: inherit; white-space: nowrap;
}
.chat-input button:hover { background: var(--eggplant); }
.chat-input button:focus-visible { outline: 2px solid var(--wisteria); outline-offset: 2px; }

/* ── Message Bubbles ────────────────── */
.msg { display: flex; gap: 0.5rem; max-width: 82%; animation: msgIn 0.3s ease-out; }
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }

.msg .avatar-icon {
  width: clamp(1.8rem, 3vw, 2.2rem); height: clamp(1.8rem, 3vw, 2.2rem);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: clamp(0.95rem, 1.3vw, 1.10rem); flex-shrink: 0; align-self: flex-end;
}
.msg.assistant .avatar-icon { background: var(--wisteria-ghost); }
.msg.user .avatar-icon { background: var(--eggplant); color: #fff; }

.msg .bubble {
  padding: 0.7rem 0.9rem; border-radius: var(--radius-md);
  font-size: clamp(1.00rem, 1.3vw, 1.15rem); line-height: 1.55;
  background: var(--white); box-shadow: var(--shadow-card);
}
.msg.user .bubble { background: var(--eggplant); color: rgba(255,255,255,0.92); }

/* ── Choice Cards ───────────────────── */
.choices { display: flex; flex-wrap: wrap; align-items: center; gap: 0.45rem; margin-top: 0.45rem; }
.choice-letter {
  display: inline-flex; align-items: center; justify-content: center;
  width: 1.3rem; height: 1.3rem; border-radius: 50%;
  background: var(--wisteria-ghost); color: var(--wisteria);
  font-size: 0.7rem; font-weight: 600; flex-shrink: 0;
  margin-right: 0.25rem;
}
.choice-card {
  padding: 0.45rem 0.9rem;
  background: var(--white);
  border: 1.5px solid var(--lilac-light);
  border-radius: var(--radius-md);
  font-size: clamp(0.95rem, 1.2vw, 1.05rem);
  color: var(--text); cursor: pointer;
  transition: all var(--transition);
  display: inline-flex; align-items: center;
  font-family: inherit; outline: none;
}
.choice-card:hover {
  border-color: var(--wisteria);
  box-shadow: 0 2px 8px rgba(139,107,158,0.15);
  transform: translateY(-1px);
}
.choice-card:hover .choice-letter { background: var(--wisteria); color: #fff; }
.choice-card:focus-visible { outline: 2px solid var(--wisteria); outline-offset: 2px; }
.choice-card.selected {
  background: var(--wisteria-ghost); border-color: var(--wisteria);
  color: var(--plum); font-weight: 500;
}
.choice-card.selected .choice-letter { background: var(--wisteria); color: #fff; }

.choice-hint {
  width: 100%; margin-top: 0.3rem;
  font-size: clamp(0.75rem, 1vw, 0.8rem);
  color: var(--lilac);
}

/* ── Diagnosis Report ───────────────── */
.report-card {
  background: var(--white); border-radius: var(--radius-lg);
  padding: 1.4rem; box-shadow: var(--shadow-elevated);
  border-left: 4px solid #6b9ccc;
  animation: reportIn 0.4s ease-out;
}
@keyframes reportIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.report-card h3 {
  font-family: "STSong", "Songti SC", "Noto Serif SC", serif;
  font-size: clamp(1.10rem, 1.5vw, 1.30rem); font-weight: 500;
  margin-bottom: 0.8rem; color: #5a8ab5;
}
.report-card .section { margin-bottom: 0.6rem; }
.report-card .section .label {
  font-size: clamp(0.85rem, 1vw, 0.95rem); font-weight: 600;
  color: var(--text-secondary); letter-spacing: 0.03em; margin-bottom: 0.15rem;
}
.report-card .section p {
  font-size: clamp(0.95rem, 1.2vw, 1.05rem); line-height: 1.6; color: var(--text);
}
.report-card .disclaimer {
  margin-top: 0.8rem; padding-top: 0.6rem;
  border-top: 1px solid var(--lilac-light);
  font-size: clamp(0.85rem, 1vw, 0.90rem); color: var(--mauve); line-height: 1.5;
}

/* ── Responsive ─────────────────────── */
@media (max-width: 48rem) {
  .app { flex-direction: column; }
  .sidebar { flex: 0 0 auto; }
  .sidebar-sessions { display: none; }
  .chat-messages { padding: 0.5rem 0.8rem; }
  .chat-input { padding: 0.4rem 0.8rem 0.6rem; }
  .msg { max-width: 92%; }
}

/* ── Scrollbar ──────────────────────── */
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--lilac-light); border-radius: 99px; }
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">兰</div>
      <h1>灵兰 · AI 健康咨询</h1>
    </div>

    <button class="btn-new">+ 新建会话</button>

    <div class="sidebar-sessions">
      <div class="section-label">近期会话</div>
      <div class="sidebar-session active">
        <span class="indicator"></span>
        <div class="info">
          <div class="title">头痛咨询</div>
          <div class="meta">今天 14:32</div>
        </div>
      </div>
      <div class="sidebar-session">
        <span class="indicator"></span>
        <div class="info">
          <div class="title">年度体检解读</div>
          <div class="meta">6月20日</div>
        </div>
      </div>
      <div class="sidebar-session">
        <span class="indicator"></span>
        <div class="info">
          <div class="title">皮肤过敏咨询</div>
          <div class="meta">6月15日</div>
        </div>
      </div>
    </div>

    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="avatar">张</div>
        <div>
          <div class="name">张先生</div>
          <div class="phone">138****8001</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="chat-header">
      <span class="stage-badge" id="stageBadge">基础问诊</span>
      <span class="stage-badge expert" style="display:none" id="expertBadge">专家问诊</span>
      <span class="round-info" id="roundInfo">第 2 / 10 轮</span>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="描述您的症状..." autofocus>
      <button id="sendBtn">发送</button>
    </div>
  </main>

</div>

<script>
const messagesEl = document.getElementById('chatMessages');
const inputEl = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const stageBadge = document.getElementById('stageBadge');
const expertBadge = document.getElementById('expertBadge');
const roundInfo = document.getElementById('roundInfo');
let round = 0;
const TOTAL_ROUNDS = 10;

const conversation = [
  { role: 'assistant', content: '您好，张先生。我是您的 AI 健康助手。请描述您当前的不适症状，我会逐步帮您分析。', choices: null, stage: 'init' },
  { role: 'user', content: '我头痛，持续两天了，吃了布洛芬也没缓解。', choices: null, stage: 'basic' },
  { role: 'assistant', content: '您具体是哪个部位疼痛？', choices: [
    { label: '前额', value: '前额' }, { label: '后脑 / 枕部', value: '后脑' }, { label: '两侧 / 太阳穴', value: '两侧' }, { label: '整个头部', value: '全头' }
  ], stage: 'basic' },
  { role: 'user', content: '两侧太阳穴附近。', choices: null, stage: 'basic' },
  { role: 'assistant', content: '疼痛是什么性质的？', choices: [
    { label: '跳痛 / 搏动性', value: '跳痛' }, { label: '压迫感 / 紧箍感', value: '压迫' }, { label: '针刺样', value: '针刺' }, { label: '钝痛', value: '钝痛' }
  ], stage: 'basic' },
  { role: 'user', content: '像是被带子勒紧的压迫感。', choices: null, stage: 'expert' },
  { role: 'assistant', content: '根据已采集信息，结合医学知识库，我想进一步了解——头痛发作前，您是否出现过以下先兆症状？', choices: [
    { label: '眼前闪光或暗点', value: '闪光' }, { label: '视物模糊', value: '模糊' }, { label: '单侧面部麻木', value: '麻木' }, { label: '没有任何先兆', value: 'none' }
  ], stage: 'expert' },
  { role: 'user', content: '似乎眼前有点模糊，但不确定是不是先兆。', choices: null, stage: 'expert' },
  { role: 'assistant', content: null, choices: null, stage: 'diagnose', report: {
    primary: '紧张型头痛（Tension-Type Headache）',
    differential: ['无先兆偏头痛（需进一步排除）', '颈源性头痛'],
    risk: '轻度 — 暂无紧急指征',
    advice: ['保持规律作息，避免熬夜', '注意颈肩部放松，避免长时间低头', '如症状加重或频率增加，建议神经内科门诊'],
    redFlags: ['突发剧烈头痛（雷击样）', '伴随发热、颈部僵硬', '头痛进行性加重'],
    disclaimer: '本内容仅供参考，不能替代专业医疗诊断。如有不适，请及时就医。'
  }}
];

let msgIndex = 0, waitingForReply = false;

function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function createMessage(role, content, choices, report) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'avatar-icon';
  avatar.textContent = role === 'assistant' ? 'AI' : '张';
  div.appendChild(avatar);
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (content) { const p = document.createElement('p'); p.textContent = content; bubble.appendChild(p); }
  if (choices && choices.length > 0) {
    const cd = document.createElement('div'); cd.className = 'choices';
    const letters = 'ABCDEFGH';
    choices.forEach((ch, i) => {
      const card = document.createElement('button'); card.className = 'choice-card';
      card.innerHTML = `<span class="choice-letter">${letters[i] || '?'}</span> ${ch.label}`;
      card.addEventListener('click', () => {
        cd.querySelectorAll('.choice-card').forEach(c => {
          c.style.pointerEvents = 'none'; c.style.opacity = '0.5';
        });
        card.classList.add('selected');
        setTimeout(() => advanceConversation(ch.label), 400);
      });
      cd.appendChild(card);
    });
    // 小提示：可以直接在输入框打字
    const hint = document.createElement('p');
    hint.className = 'choice-hint';
    hint.textContent = '也可以直接在下方输入框描述您的情况';
    cd.appendChild(hint);
    bubble.appendChild(cd);
  }
  if (report) {
    const rd = document.createElement('div'); rd.className = 'report-card';
    rd.innerHTML = `<h3>初步分析报告</h3>
      <div class="section"><div class="label">主要考虑</div><p>${report.primary}</p></div>
      <div class="section"><div class="label">鉴别诊断</div><p>${report.differential.join(' · ')}</p></div>
      <div class="section"><div class="label">风险评估</div><p>${report.risk}</p></div>
      <div class="section"><div class="label">建议措施</div><p>${report.advice.map((a,i)=>`${i+1}. ${a}`).join('<br>')}</p></div>
      <div class="section"><div class="label">⚠️ 需警惕的危险信号</div><p>${report.redFlags.join(' · ')}</p></div>
      <div class="disclaimer">⚕️ ${report.disclaimer}</div>`;
    bubble.appendChild(rd);
    inputEl.disabled = true; inputEl.placeholder = '诊断已完成，可新建会话继续'; sendBtn.disabled = true;
  }
  div.appendChild(bubble); messagesEl.appendChild(div); scrollToBottom();
}

function updateStage(stage) {
  stageBadge.style.display = 'none'; expertBadge.style.display = 'none';
  if (stage === 'basic') { stageBadge.style.display = 'inline'; stageBadge.textContent = '基础问诊'; }
  else if (stage === 'expert') { expertBadge.style.display = 'inline'; expertBadge.textContent = '专家问诊'; }
  else if (stage === 'diagnose') { stageBadge.style.display = 'inline'; stageBadge.textContent = '诊断报告'; }
}

function advanceConversation(userChoice) {
  if (msgIndex >= conversation.length) return;
  const msg = conversation[msgIndex++];
  round = Math.min(round + 1, TOTAL_ROUNDS);
  if (userChoice && msg.role === 'user' && !msg.content) { createMessage('user', userChoice); msgIndex--; return; }
  createMessage(msg.role, msg.content, msg.choices, msg.report);
  if (msg.stage) updateStage(msg.stage);
  if (msg.role === 'assistant') roundInfo.textContent = `第 ${round} / ${TOTAL_ROUNDS} 轮`;
  scrollToBottom();
  if (msg.role === 'user' && msgIndex < conversation.length) setTimeout(() => advanceConversation(), 800 + Math.random() * 600);
  waitingForReply = false;
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || waitingForReply || inputEl.disabled) return;
  waitingForReply = true; inputEl.value = '';
  createMessage('user', text);
  roundInfo.textContent = `第 ${round + 1} / ${TOTAL_ROUNDS} 轮`;
  setTimeout(() => advanceConversation(), 1000);
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
advanceConversation();
</script>
</body>
</html>
